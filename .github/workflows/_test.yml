name: Unit Tests

on: workflow_call

jobs:
  test:
    name: Test on ${{matrix.python.version}}-${{matrix.platform.runner}}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        # Removed until issue #135 from python 3.12 is resolved.
        # platform:
        #   - runner: ubuntu-latest
        #   - runner: windows-latest
        #   # - runner: macos-latest
        # python:
        #   - version: '3.11'
        #   - version: '3.12'
        include:
          - platform: {runner: ubuntu-latest}
            python: {version: '3.11'}
          - platform: {runner: ubuntu-latest}
            python: {version: '3.12'}
          - platform: {runner: windows-latest}
            python: {version: '3.11'}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}
      - name: Install the project
        run: uv sync -p ${{ matrix.python.version }} -U --no-dev
      - name: Run pytest
        run: >
          uv run --with pytest --with pytest-cov
          pytest --cov -m "not system"
